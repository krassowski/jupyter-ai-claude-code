[workspace]
authors = ["Brian E. Granger <ellisonbg@gmail.com>"]
channels = ["conda-forge"]
name = "jupyter-ai-claude-code"
platforms = ["osx-arm64"]
version = "0.0.0"

[tasks]
start = "jupyter lab"

[dependencies]
python = ">=3.9"
hatchling = "*"

[pypi-dependencies]
claude-code-sdk = ">=0.0.25"
jupyterlab = ">=4.4.0"
jupyter_server = ">=2.4.0"
jupyterlab-chat = ">=0.18.2"
jupyter-ai-persona-manager = ">=0.0.4"
jupyter-ai-claude-code = { path = ".", editable = true }
